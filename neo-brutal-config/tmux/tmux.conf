set -g default-command "/usr/bin/fish"
set -g history-limit 500000
set -s default-terminal "tmux-256color"
set -s escape-time 0
set -g mouse on
set -g focus-events on

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

set -s set-clipboard on
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:Tc"

# Neobrut Dark theme
set -g pane-border-lines heavy
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89B4FA"
set -g pane-border-indicators colour
set -g pane-border-format " #{?pane_active,#[fg=#CDD6F4 bg=#1E1E2E bold]▌ #{pane_index}: #{?pane_title,#{pane_title},#{pane_current_command}  #{pane_current_path}},#[fg=#6C7086 bg=#1E1E2E]▌ #{pane_index}: #{?pane_title,#{pane_title},#{pane_current_command}  #{pane_current_path}}} #{?pane_marked,#[fg=#FFD93D bold]⬡ ,}"
set -g pane-border-status bottom
set -g window-style "bg=#1E1E2E"
set -g window-active-style "bg=#1E1E2E"

set -g status-position bottom
set -g status-style "bg=#1E1E2E,fg=#CDD6F4"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[fg=#1E1E2E,bg=#89B4FA,bold] #{session_name} #[fg=#6C7086,bg=#1E1E2E] │ "
set -g status-right "#[fg=#6C7086]│ #[fg=#A6E3A1]#{host} #[fg=#6C7086]│ #[fg=#CDD6F4]%Y-%m-%d %H:%M "
set -g status-justify left
set -g window-status-format "#[fg=#6C7086]  #{window_index}:#{window_name}  "
set -g window-status-current-format "#[fg=#1E1E2E,bg=#FF6B6B,bold]  #{window_index}:#{window_name}  "
set -g window-status-separator "#[fg=#313244]│"

set -g message-style "fg=#1E1E2E,bg=#FFD93D,bold"
set -g message-command-style "fg=#1E1E2E,bg=#FFD93D"
set -g mode-style "fg=#1E1E2E,bg=#CBA6F7"
set -g clock-mode-colour "#FF6B6B"

# Pane management
bind -n C-MouseDown1Pane if-shell -F '#{pane_marked_set}' \
  'select-pane -t= ; swap-pane ; select-pane -M' \
  'select-pane -t= ; select-pane -m'
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r Left  resize-pane -L 3
bind -r Down  resize-pane -D 3
bind -r Up    resize-pane -U 3
bind -r Right resize-pane -R 3
bind = select-layout tiled

# Rename: click/double-click status bar, double-click pane border
bind -n MouseDown1StatusLeft command-prompt -I '#{session_name}' -p ' Rename session:' { rename-session '%1' }
bind -n DoubleClick1Status command-prompt -I '#{window_name}' -p ' Rename window:' { rename-window '%1' }
bind -n MouseDown1Border select-pane -t=
bind -n DoubleClick1Border command-prompt -p ' Rename pane:' { select-pane -t= ; select-pane -T '%1' }
bind R command-prompt -I '#{session_name}' -p ' Rename session:' { rename-session '%1' }
bind r command-prompt -I '#{window_name}' -p ' Rename window:' { rename-window '%1' }
bind t command-prompt -p ' Rename pane:' { select-pane -T '%1' }
